<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlameAI — Digital Entity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="menu-toggle" class="menu-toggle">
    <span></span>
    <span></span>
    <span></span>
</button>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
        <button id="new-chat-btn" class="new-chat-btn">
            <span class="plus-icon">+</span> НОВЫЙ ДИАЛОГ
        </button>
        <div class="history-label">ИСТОРИЯ ПАМЯТИ</div>
        <div id="chat-list" class="chat-list"></div>
    </div>
</aside>

<canvas id="bg-canvas"></canvas>

<main class="chat-container">
    <header class="chat-header">
        <div class="status-group">
            <div class="status-dot"></div>
            <span class="status-text">FLAME AI</span>
        </div>
    </header>
    
    <div id="chat-messages"></div>
    
    <footer class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Введите ваш запрос..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </footer>
</main>

<script src="script.js"></script>
</body>
</html>
