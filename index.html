<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FlameAI Vision & Code Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div id="app-container">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">F</div>
                <div class="brand-text">FlameAI</div>
            </div>
            <button id="new-chat-btn" class="new-chat-btn">+ НОВЫЙ АНАЛИЗ</button>
            <div class="history-title">ИСТОРИЯ СЕССИЙ</div>
            <div id="chat-list" class="chat-list"></div>
        </aside>

        <main class="workspace">
            <section class="chat-section">
                <header class="chat-header">
                    <div class="header-title">Vision Console v2.0</div>
                    <div class="header-status"><div class="status-dot"></div> ONLINE</div>
                </header>

                <div id="chat-messages"></div>

                <div class="input-zone" id="drop-zone">
                    <div id="image-preview-container"></div>
                    <div class="input-form">
                        <label for="file-input" class="vision-upload-btn" id="upload-btn">📎</label>
                        <input type="file" id="file-input" accept="image/*">
                        <textarea id="text-input" placeholder="Введите запрос или перетащите скриншот кода..."></textarea>
                        <button class="send-btn" id="send-btn">➔</button>
                    </div>
                </div>
            </section>

            <div id="code-inspector">
                <div class="code-inspector-header">
                    <div class="code-title-area">
                        <span class="code-icon">{}</span>
                        <div id="ci-title" class="code-title">Script_Output.js</div>
                    </div>
                    <div class="code-actions">
                        <button id="ci-copy" class="action-btn btn-copy">Копировать код</button>
                        <button id="ci-close" class="action-btn btn-close">Закрыть</button>
                    </div>
                </div>
                <div class="code-content-area">
                    <pre id="ci-pre" class="flame-code-block"></pre>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
